<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ZIIN Assessoria — Gerador de Relatório</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#1A1A1A; --dark2:#2E2E2E; --dark3:#3D3D3D;
  --gold:#C9A84C; --gold-pale:#FBF5E7; --gold-border:rgba(201,168,76,.3);
  --muted:#888; --border:rgba(46,46,46,.14); --border2:rgba(26,26,26,.09);
  --bg:#F5F5F5; --surface:#fff;
  --sh-sm:0 1px 6px rgba(0,0,0,.07); --sh:0 2px 16px rgba(0,0,0,.10);
  --r:6px; --rl:10px;
  --green-pill:#0E6B47; --green-pill-bg:#EDFAF4;
  --amber-pill:#8A5E0A; --amber-pill-bg:#FEF8EC;
  --blue-pill:#2351A3; --blue-pill-bg:#EDF2FB;
  --purple-pill:#6B2FA0; --purple-pill-bg:#F3EDF8;
}
html{scroll-behavior:smooth}
body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--dark);font-size:13px;line-height:1.6;-webkit-print-color-adjust:exact;print-color-adjust:exact}

/* ═══════════════════════════════════════════
   SHELL HEADER
═══════════════════════════════════════════ */
.shell-header{background:var(--dark);height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.28)}
.hdr-brand{display:flex;align-items:center;gap:11px}
.hdr-logo{height:26px;width:auto;display:block;filter:invert(1) brightness(2)}
.hdr-sub{color:rgba(255,255,255,.38);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.hdr-badge{display:flex;align-items:center;gap:7px;padding:5px 13px;border:1px solid rgba(255,255,255,.16);border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.16em;color:rgba(255,255,255,.6);text-transform:uppercase}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.layout{max-width:1040px;margin:0 auto;display:grid;grid-template-columns:248px 1fr;gap:20px;padding:24px 20px 80px}

/* ═══════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════ */
.sidebar{position:sticky;top:80px;height:fit-content;display:flex;flex-direction:column;gap:13px}
.card{background:var(--surface);border-radius:var(--rl);box-shadow:var(--sh-sm);border:1px solid var(--border2)}
.card-head{padding:11px 15px;border-bottom:1px solid var(--border2);font-size:8.5px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
.card-head::before{content:'';width:11px;height:2px;background:var(--gold);border-radius:99px;flex-shrink:0}
.card-body{padding:13px 15px}

.tipo-list{display:flex;flex-direction:column;gap:4px}
.tipo-opt{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);border:1.5px solid transparent;background:transparent;cursor:pointer;transition:all .13s;width:100%;text-align:left;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;color:var(--dark3)}
.tipo-opt:hover{background:var(--bg);border-color:var(--border)}
.tipo-opt.active{background:var(--dark);color:#fff;border-color:var(--dark)}
.tipo-opt .ico{font-size:14px;flex-shrink:0;width:18px;text-align:center}

.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.fg:last-child{margin-bottom:0}
.fg label{font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.fg input,.fg textarea,.fg select{font-family:'Montserrat',sans-serif;font-size:11.5px;font-weight:500;padding:7px 9px;border:1px solid var(--border2);border-radius:var(--r);color:var(--dark);background:var(--bg);transition:border-color .14s,box-shadow .14s;width:100%}
.fg textarea{min-height:58px;resize:vertical;line-height:1.5}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--dark2);box-shadow:0 0 0 3px rgba(46,46,46,.09)}

.btn-export{width:100%;padding:10px;background:var(--dark);color:#fff;border:none;border-radius:var(--r);font-family:'Montserrat',sans-serif;font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .13s}
.btn-export:hover{background:var(--dark2)}
.btn-reset{width:100%;padding:7px;margin-top:5px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:var(--r);font-family:'Montserrat',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .13s}
.btn-reset:hover{background:var(--bg);color:var(--dark);border-color:var(--border)}

/* ═══════════════════════════════════════════
   DOC WRAP
═══════════════════════════════════════════ */
.doc-wrap{min-width:0}
.doc-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap;gap:8px}
.doc-tipo-badge{font-size:8.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;padding:4px 12px;border-radius:99px;background:var(--dark);color:#fff}
.doc-hint{font-size:10px;color:var(--muted)}
.btn-sm-gold{padding:5px 13px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-family:'Montserrat',sans-serif;border:none;border-radius:var(--r);background:var(--gold);color:var(--dark);cursor:pointer;transition:opacity .13s}
.btn-sm-gold:hover{opacity:.85}
.btn-sm{padding:5px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'Montserrat',sans-serif;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--dark3);cursor:pointer;transition:all .12s}
.btn-sm:hover{background:var(--bg);border-color:var(--dark2);color:var(--dark)}

/* ═══════════════════════════════════════════
   THE DOCUMENT
═══════════════════════════════════════════ */
.doc{background:var(--surface);border-radius:var(--rl);box-shadow:var(--sh);border:1px solid var(--border2);overflow:hidden}

/* Editable behaviour */
[contenteditable]{outline:none;border-radius:3px;transition:background .12s,box-shadow .12s}
[contenteditable]:hover{background:rgba(201,168,76,.07)}
[contenteditable]:focus{background:rgba(201,168,76,.13);box-shadow:0 0 0 2px rgba(201,168,76,.35)}
.edit-hint{font-size:9.5px;color:var(--muted);font-style:italic;margin-top:4px}

/* Doc header – black */
.doc-hdr{background:var(--dark);padding:26px 36px 22px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px}
.doc-hdr-left .brand-label{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.doc-hdr-left .doc-title{font-size:22px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:3px}
.doc-hdr-left .doc-sub{font-size:11.5px;color:rgba(255,255,255,.42);font-weight:500}
.doc-hdr-right{text-align:right;flex-shrink:0}
.doc-hdr-right .hdr-label{font-size:8.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.32);margin-bottom:5px}
.doc-hdr-right .hdr-val{font-size:12px;font-weight:600;color:rgba(255,255,255,.7)}
.doc-hdr-right .hdr-val2{font-size:22px;font-weight:800;color:#fff;margin-top:2px}

/* cooperado/patrimonio bar */
.coop-bar{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border2)}
.coop-cell{padding:14px 20px}
.coop-cell:first-child{border-right:1px solid var(--border2)}
.coop-cell .cl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.coop-cell .cv{font-size:14px;font-weight:700;color:var(--dark)}
.coop-cell.dark-cell{background:var(--dark)}
.coop-cell.dark-cell .cl{color:rgba(255,255,255,.4)}
.coop-cell.dark-cell .cv{color:#fff}

/* body */
.doc-body{padding:28px 36px}

/* section label – gold line underneath */
.sec-lbl{font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--dark2);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--gold);display:flex;align-items:center;gap:8px}

.sec{margin-bottom:26px}
.sec:last-child{margin-bottom:0}

/* body text */
.body-text{font-size:12.5px;line-height:1.85;color:var(--dark3);padding:2px}

/* metrics grid */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:9px}
.metric-card{background:var(--bg);border-radius:var(--r);border-top:2px solid var(--border2);padding:11px 13px}
.metric-card.gold{border-top-color:var(--gold)}
.m-lbl{font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.m-val{font-size:17px;font-weight:800;color:var(--dark);line-height:1.1}
.m-val.gold{color:var(--gold)}
.m-sub{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500}

/* perf table (used in comparativo and carteira) */
.perf-table{width:100%;border-collapse:collapse}
.perf-table th{font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:7px 10px;border-bottom:1.5px solid var(--border);text-align:left}
.perf-table td{padding:8px 10px;border-bottom:1px solid var(--border2);font-size:12px;color:var(--dark)}
.perf-table tr:last-child td{border-bottom:none;font-weight:700;background:var(--bg)}
.perf-table .gold-cell{color:var(--gold);font-weight:700}
.pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-weight:700}
.pill-pos{background:var(--green-pill-bg);color:var(--green-pill)}
.pill-inf{background:var(--amber-pill-bg);color:var(--amber-pill)}
.pill-pre{background:var(--blue-pill-bg);color:var(--blue-pill)}
.pill-mm{background:var(--purple-pill-bg);color:var(--purple-pill)}

/* fund cards */
.fund-card{border:1px solid var(--border2);border-radius:var(--rl);overflow:hidden;margin-bottom:11px;box-shadow:var(--sh-sm)}
.fund-card:last-child{margin-bottom:0}
.fund-head{padding:11px 15px 9px;border-bottom:1px solid var(--border2);background:var(--bg);display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.fund-name{font-size:12.5px;font-weight:700;color:var(--dark);line-height:1.3}
.fund-type{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}
.fund-tags{display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0;margin-top:2px}
.tag{font-size:9.5px;font-weight:700;padding:2px 8px;border-radius:99px}
.tag-liq{background:var(--green-pill-bg);color:var(--green-pill)}
.tag-val{background:var(--gold-pale);color:#7A5500}
.fund-metrics{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border2)}
.fm{padding:8px 11px;border-right:1px solid var(--border2);text-align:center}
.fm:last-child{border-right:none}
.fm-val{font-size:12.5px;font-weight:700;color:var(--dark)}
.fm-lbl{font-size:8.5px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.fund-rationale{padding:10px 15px;font-size:12px;line-height:1.8;color:var(--dark3)}
.fund-rationale strong{color:var(--dark);font-weight:700}

/* liq bars */
.liq-row{display:flex;align-items:center;gap:11px;margin-bottom:8px}
.liq-lbl{font-size:11px;font-weight:600;color:var(--dark3);width:86px;flex-shrink:0}
.liq-bar-wrap{flex:1;height:6px;background:var(--border2);border-radius:99px;overflow:hidden}
.liq-bar{height:100%;border-radius:99px}
.liq-pct{font-size:11.5px;font-weight:700;color:var(--dark);width:33px;text-align:right;flex-shrink:0}
.liq-val{font-size:10.5px;font-weight:500;color:var(--muted);width:88px;text-align:right;flex-shrink:0}

/* reason list */
.reason-list{display:flex;flex-direction:column;gap:10px}
.reason-item{display:flex;gap:10px;align-items:flex-start}
.reason-num{font-size:9.5px;font-weight:800;color:var(--dark);width:21px;height:21px;border-radius:50%;border:2px solid var(--dark);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.reason-text{flex:1;font-size:12.5px;line-height:1.8;color:var(--dark3)}
.reason-text strong{color:var(--dark);font-weight:700}

/* next steps */
.steps-list{list-style:none;counter-reset:step;display:flex;flex-direction:column;gap:11px}
.step-item{display:flex;gap:11px;align-items:flex-start;counter-increment:step}
.step-item::before{content:counter(step,"01");font-size:9.5px;font-weight:800;color:var(--gold);width:25px;height:25px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-variant-numeric:tabular-nums}
.step-body{flex:1;font-size:12.5px;line-height:1.8;color:var(--dark3)}
.step-body strong{display:block;color:var(--dark);font-weight:700;margin-bottom:2px}

/* comparativo side-by-side */
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.compare-card{border:1px solid var(--border2);border-radius:var(--rl);overflow:hidden}
.compare-head{padding:10px 14px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border2)}
.compare-head.gold-head{background:var(--dark);color:var(--gold)}
.compare-body{padding:13px 14px}
.compare-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border2);font-size:12px}
.compare-row:last-child{border-bottom:none;font-weight:700}
.compare-row .lbl{color:var(--muted);font-size:11px}
.compare-row .val{font-weight:600;color:var(--dark)}
.compare-row .val.up{color:var(--green-pill)}
.compare-row .val.down{color:#c0392b}
.compare-row .val.gold{color:var(--gold)}

/* bullet list */
.blist{list-style:none;display:flex;flex-direction:column;gap:6px;padding:3px 0}
.blist li{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;line-height:1.7;color:var(--dark3)}
.blist li::before{content:'•';color:var(--gold);font-weight:700;margin-top:1px;flex-shrink:0}

/* stat table (for comparativo stats) */
.stat-table{width:100%;border-collapse:collapse}
.stat-table th{font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:7px 10px;border-bottom:1.5px solid var(--border);text-align:left}
.stat-table th:not(:first-child){text-align:right}
.stat-table td{padding:7px 10px;border-bottom:1px solid var(--border2);font-size:12px;color:var(--dark)}
.stat-table td:not(:first-child){text-align:right;font-weight:600}
.stat-table tr:last-child td{border-bottom:none}
.stat-table .gold{color:var(--gold)}

/* phase list */
.phase-list{display:flex;flex-direction:column;gap:13px}
.phase-item{border-left:3px solid var(--gold);padding-left:13px}
.phase-title{font-size:11px;font-weight:700;color:var(--dark);margin-bottom:4px;letter-spacing:.02em}
.phase-desc{font-size:12px;line-height:1.75;color:var(--dark3)}

/* doc footer */
.doc-footer{border-top:1px solid var(--border2);padding:11px 36px;display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.doc-footer span{font-size:9px;color:var(--muted);font-weight:500}

/* add buttons */
.add-btn{margin-top:8px;padding:4px 11px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'Montserrat',sans-serif;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .12s}
.add-btn:hover{background:var(--bg);border-color:var(--dark2);color:var(--dark)}

/* deletable sections */
.sec{position:relative}
.sec:hover .sec-actions{opacity:1}
.sec-actions{position:absolute;top:0;right:0;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.sec-del{padding:3px 8px;font-size:9px;font-weight:700;letter-spacing:.08em;font-family:'Montserrat',sans-serif;border:1px solid #f0c0c0;border-radius:var(--r);background:#fff5f5;color:#c0392b;cursor:pointer;transition:all .12s}
.sec-del:hover{background:#fde8e8;border-color:#c0392b}

/* free text block */
.free-block{border:1.5px dashed var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:0;position:relative}
.free-block:hover .sec-actions{opacity:1}
.free-block-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dark2);margin-bottom:6px;border-bottom:1px solid var(--border2);padding-bottom:5px}
.free-block-body{font-size:12.5px;line-height:1.85;color:var(--dark3);min-height:40px}

/* add-field floating bar */
.add-field-bar{display:flex;align-items:center;gap:6px;margin-top:10px;padding-top:10px;border-top:1px dashed var(--border)}
.add-field-bar span{font-size:9px;color:var(--muted);font-weight:600;letter-spacing:.1em;text-transform:uppercase}

/* ═══════════════════════════════════════════
   PRINT
═══════════════════════════════════════════ */
@media print{
  .shell-header,.sidebar,.doc-bar,.edit-hint,.add-btn,.sec-actions,.add-field-bar{display:none!important}
  .layout{display:block;padding:0;margin:0;max-width:100%}
  .doc-wrap{display:block}
  .doc{border:none;border-radius:0;box-shadow:none}
  body{background:#fff;font-size:11.5px}
  [contenteditable]:hover,[contenteditable]:focus{background:transparent!important;box-shadow:none!important}
  .doc-body{padding:22px 36px}
  .doc-hdr{padding:18px 36px}
  .fund-card,.sec,.compare-card{break-inside:avoid;page-break-inside:avoid}
  @page{margin:14mm 12mm;size:A4}
}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:740px){
  .layout{grid-template-columns:1fr;padding:14px 12px 60px}
  .sidebar{position:static}
  .fund-metrics{grid-template-columns:repeat(2,1fr)}
  .metrics-grid{grid-template-columns:repeat(2,1fr)}
  .doc-hdr{flex-direction:column;gap:10px}
  .doc-hdr-right{text-align:left}
  .doc-body{padding:18px 16px}
  .compare-grid{grid-template-columns:1fr}
}
</style>
</head>

<script>
/* ═══════════════════════════════════
   TIPOS
═══════════════════════════════════ */
const TIPO_LABELS = {
  agenda:'Retorno de agenda',
  carteira:'Carteira proposta',
  revisao:'Revisão de carteira',
  comparativo:'Comparativo de carteiras',
  previdencia:'Comparativo previdência VGBL',
  duvida:'Dúvida sobre produto / instrumento'
};

let currentTipo = 'agenda';

function setTipo(btn) {
  document.querySelectorAll('.tipo-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTipo = btn.dataset.tipo;
  document.getElementById('badge-tipo').textContent = TIPO_LABELS[currentTipo];
  renderTemplate(currentTipo);
  updateCoopBar();
  resetSidebarFields();
}

function updateCoopBar() {
  const bar = document.getElementById('coop-bar');
  bar.style.display = ['carteira','previdencia','revisao'].includes(currentTipo) ? 'grid' : 'none';
}

function resetSidebarFields() {
  ['f-titulo','f-capital','f-coop','f-data'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('d-titulo').textContent = TIPO_LABELS[currentTipo];
  document.getElementById('d-capital').textContent = 'Capital disponível: R$ —';
  document.getElementById('d-data').textContent = '—';
  document.getElementById('d-coop').textContent = '—';
  document.getElementById('d-coop-capital').textContent = 'R$ —';
}

/* ═══════════════════════════════════
   SYNC
═══════════════════════════════════ */
function sync(from, to) {
  const val = document.getElementById(from).value;
  const el = document.getElementById(to);
  if (!el) return;
  if (to === 'd-capital') {
    el.textContent = val ? 'Capital disponível: ' + val : 'Capital disponível: R$ —';
    const el2 = document.getElementById('d-coop-capital');
    if (el2) el2.textContent = val || 'R$ —';
  } else if (to === 'd-coop') {
    el.textContent = val || '—';
  } else {
    el.textContent = val || (to === 'd-data' ? '—' : TIPO_LABELS[currentTipo]);
  }
}

/* ═══════════════════════════════════
   FOOTER DATE
═══════════════════════════════════ */
document.getElementById('footer-date').textContent =
  new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'long', year:'numeric'});

/* ═══════════════════════════════════
   ADD HELPERS
═══════════════════════════════════ */
function addFundCard(containerId) {
  const c = document.getElementById(containerId);
  if (!c) return;
  const d = document.createElement('div');
  d.className = 'fund-card';
  d.innerHTML = `
    <div class="fund-head">
      <div>
        <div class="fund-name" contenteditable="true">Nome do fundo</div>
        <div class="fund-type" contenteditable="true">Classe | Subtipo</div>
      </div>
      <div class="fund-tags">
        <span class="tag tag-liq" contenteditable="true">Liquidez: D+0</span>
        <span class="tag tag-val" contenteditable="true">Valor: R$ — (—%)</span>
      </div>
    </div>
    <div class="fund-metrics">
      <div class="fm"><div class="fm-val" contenteditable="true">—%</div><div class="fm-lbl">Rent. 12m</div></div>
      <div class="fm"><div class="fm-val" contenteditable="true">—%</div><div class="fm-lbl">% CDI</div></div>
      <div class="fm"><div class="fm-val" contenteditable="true">—%</div><div class="fm-lbl">Vol. 12m</div></div>
      <div class="fm"><div class="fm-val" contenteditable="true">—%</div><div class="fm-lbl">Participação</div></div>
    </div>
    <div class="fund-rationale"><strong contenteditable="true">Por que está aqui: </strong><span contenteditable="true">Descreva o racional de inclusão deste ativo na carteira.</span></div>`;
  c.appendChild(d);
  d.querySelector('.fund-name').focus();
}

function addTableRow(tbodyId, cols) {
  const tb = document.getElementById(tbodyId);
  if (!tb) return;
  const last = tb.querySelector('tr:last-child');
  const tr = document.createElement('tr');
  tr.innerHTML = cols.map(c => `<td contenteditable="true">${c}</td>`).join('');
  tb.insertBefore(tr, last);
}

function addLiqRow(containerId) {
  const c = document.getElementById(containerId);
  if (!c) return;
  const colors = ['var(--dark2)','var(--gold)','#aaa','#555'];
  const r = document.createElement('div'); r.className = 'liq-row';
  r.innerHTML = `<div class="liq-lbl" contenteditable="true">D+—</div><div class="liq-bar-wrap"><div class="liq-bar" style="width:10%;background:${colors[c.children.length%colors.length]}"></div></div><div class="liq-pct" contenteditable="true">—%</div><div class="liq-val" contenteditable="true">R$ —</div>`;
  c.appendChild(r);
}

function addReasonItem(listId) {
  const list = document.getElementById(listId);
  if (!list) return;
  const n = list.querySelectorAll('.reason-item').length + 1;
  const d = document.createElement('div'); d.className = 'reason-item';
  d.innerHTML = `<div class="reason-num">${n}</div><div class="reason-text"><strong contenteditable="true">Título.</strong> <span contenteditable="true">Desenvolva a justificativa aqui.</span></div>`;
  list.appendChild(d);
  d.querySelector('strong').focus();
}

function addStepItem(listId) {
  const list = document.getElementById(listId);
  if (!list) return;
  const li = document.createElement('li'); li.className = 'step-item';
  li.innerHTML = `<div class="step-body"><strong contenteditable="true">Título do próximo passo</strong><span contenteditable="true">Detalhe o encaminhamento acordado.</span></div>`;
  list.appendChild(li);
  li.querySelector('strong').focus();
}

function addBulletItem(listId) {
  const list = document.getElementById(listId);
  if (!list) return;
  const li = document.createElement('li');
  li.innerHTML = `<span contenteditable="true">Novo item</span>`;
  list.appendChild(li);
  li.querySelector('span').focus();
}

function addPhaseItem(listId) {
  const list = document.getElementById(listId);
  if (!list) return;

function addFreeField() {

  block.className = 'sec free-block';
  block.innerHTML = `
    <div class="sec-actions"><button class="sec-del" onclick="deleteSec(this)">✕ Remover</button></div>

  block.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function renderTemplate(tipo) {
  const body = document.getElementById('doc-body');

  body.querySelectorAll('.sec').forEach(sec => {
    const actions = document.createElement('div');
    actions.className = 'sec-actions';

  bar.innerHTML = '<span>Adicionar campo</span><button class="add-btn" style="margin-top:0" onclick="addFreeField()">+ Campo livre</button>';
